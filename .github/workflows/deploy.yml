name: deploy-central

# Deploy POR APP: no push pra main, builda+deploya SÓ o app que mudou.
# auth → raiz do site · painel → /painel · portal → /portal. shared/ → rebuilda os 3.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-central
  cancel-in-progress: false

env:
  SITE: /etc/icontainer/apps/openresty/openresty/www/sites/central.fenicelab.com.br
  # Supabase (cliente) — valores PÚBLICOS: a URL e a anon key são embutidas no bundle
  # entregue a todo visitante (protegidas por RLS). Ficam aqui pra o build do CI não cair
  # no placeholder (vite lê process.env.VITE_* no build). Trocar p/ secrets se preferir.
  VITE_SUPABASE_URL: https://dfwcselivuwtacsirnbo.supabase.co
  VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmd2NzZWxpdnV3dGFjc2lybmJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNDI0MTQsImV4cCI6MjA5NTkxODQxNH0.UPgRB4sCTPuUpfneZGkRXBqzRt8V2iPqvjYp7tlKvVQ

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.f.outputs.auth }}
      painel: ${{ steps.f.outputs.painel }}
      portal: ${{ steps.f.outputs.portal }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            auth:
              - 'apps/auth/**'
              - 'shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            painel:
              - 'apps/painel/**'
              - 'shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            portal:
              - 'apps/portal/**'
              - 'shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.auth == 'true' || needs.changes.outputs.painel == 'true' || needs.changes.outputs.portal == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # strictDepBuilds=false: install não falha por build script ignorado
      - run: pnpm install --frozen-lockfile --config.strictDepBuilds=false
      # garante o binário nativo do esbuild (o build script é pulado no install acima);
      # sem isso o `vite build` quebra no runner Linux com "esbuild binary not found".
      - name: rebuild esbuild
        run: pnpm rebuild esbuild

      - name: SSH setup
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
      - name: vars
        id: v
        run: echo "ssh=ssh -i ~/.ssh/deploy -p ${{ secrets.SSH_PORT }}" >> "$GITHUB_OUTPUT"

      # ── build e rsync SEPARADOS por app (steps distintos = a API mostra qual falha) ──
      - name: build auth
        if: ${{ needs.changes.outputs.auth == 'true' }}
        run: pnpm --filter @fenice/auth build
      - name: rsync auth (raiz)
        if: ${{ needs.changes.outputs.auth == 'true' }}
        # raiz: NÃO usar --delete (preserva painel/ portal/ ssl/ favicons)
        run: |
          rsync -az -e "${{ steps.v.outputs.ssh }}" apps/auth/dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$SITE/"

      - name: build painel
        if: ${{ needs.changes.outputs.painel == 'true' }}
        run: pnpm --filter @fenice/painel build
      - name: rsync painel
        if: ${{ needs.changes.outputs.painel == 'true' }}
        run: |
          ${{ steps.v.outputs.ssh }} "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p $SITE/painel"
          rsync -az --delete -e "${{ steps.v.outputs.ssh }}" apps/painel/dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$SITE/painel/"

      - name: build portal
        if: ${{ needs.changes.outputs.portal == 'true' }}
        run: pnpm --filter @fenice/portal build
      - name: rsync portal
        if: ${{ needs.changes.outputs.portal == 'true' }}
        run: |
          ${{ steps.v.outputs.ssh }} "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p $SITE/portal"
          rsync -az --delete -e "${{ steps.v.outputs.ssh }}" apps/portal/dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$SITE/portal/"

      - name: limpa lixo macOS
        run: ${{ steps.v.outputs.ssh }} "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "find $SITE -name '._*' -delete 2>/dev/null || true"
